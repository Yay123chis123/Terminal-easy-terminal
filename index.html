<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WinGen Terminal</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>

  <style>
    .scrollbar-retro::-webkit-scrollbar {
      width: 16px;
    }

    .scrollbar-retro::-webkit-scrollbar-track {
      background: #dfdfdf;
      box-shadow: inset 1px 1px 0px #000;
    }

    .scrollbar-retro::-webkit-scrollbar-thumb {
      background: #dfdfdf;
      border: 2px solid #ffffff;
      box-shadow: 1px 1px 0px #000;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
    }

    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { Minus, Square, X, Monitor } = lucideReact;

    const App = () => {
      const [input, setInput] = useState('');
      const [credits, setCredits] = useState(5);
      const [status, setStatus] = useState('SYSTEM READY');
      const [history, setHistory] = useState([
        { role: 'system', text: 'WinGen Terminal [Version 1.0.420]' },
        { role: 'system', text: '(C) WinGen Corporation. All Rights Reserved.' },
        { role: 'system', text: '\nType /Help For A List Of Commands.' }
      ]);

      const [isProcessing, setIsProcessing] = useState(false);
      const [time, setTime] = useState(
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );

      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      // Put your Gemini API key here
      const apiKey = "AIzaSyDZjKq3s0mX7wP2kT1ytBg-JL0F7YD7qp4";

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [history]);

      useEffect(() => {
        const timer = setInterval(() => {
          setTime(new Date().toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
          }));
        }, 1000);

        return () => clearInterval(timer);
      }, []);

      const handleCommand = async (e) => {
        e.preventDefault();

        if (!input.trim() || isProcessing) return;

        const fullInput = input.trim();

        setHistory(prev => [
          ...prev,
          { role: 'user', text: `C:\\Users\\User> ${fullInput}` }
        ]);

        setInput('');

        const command = fullInput.split(' ')[0].toLowerCase();
        const prompt = fullInput.split(' ').slice(1).join(' ');

        if (command === '/clear') {
          setHistory([
            { role: 'system', text: 'WinGen Terminal [Version 1.0.420]' },
            { role: 'system', text: 'Terminal cleared.' }
          ]);
          return;
        }

        if (command === '/help') {
          setHistory(prev => [
            ...prev,
            {
              role: 'system',
              text:
`Available Commands:
  /Generate Code (Prompt) - Generate Code Using AI
  /Clear                  - Clear The Screen
  /Help                   - Show This Help Message

Note: AI Generation Is Limited. Check The Status Bar For Remaining Credits.`
            }
          ]);
          return;
        }

        if (command === '/generate') {
          if (credits <= 0) {
            setHistory(prev => [
              ...prev,
              {
                role: 'error',
                text: 'Insufficient AI Credits. Please restart session.'
              }
            ]);
            return;
          }

          setIsProcessing(true);
          setStatus('AI ACTIVE');

          setHistory(prev => [
            ...prev,
            {
              role: 'system',
              text: 'Generating Code... Please Wait...'
            }
          ]);

          await callGemini(prompt || 'Helpful coding response');

          setCredits(prev => prev - 1);
          return;
        }

        setHistory(prev => [
          ...prev,
          {
            role: 'error',
            text: `'${command}' is not recognized as an internal or external command.`
          }
        ]);
      };

      const callGemini = async (prompt, retryCount = 0) => {
        try {
          if (!apiKey) {
            throw new Error('Missing Gemini API key');
          }

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: prompt
                      }
                    ]
                  }
                ]
              })
            }
          );

          if (!response.ok) {
            throw new Error('API request failed');
          }

          const data = await response.json();

          const aiText =
            data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';

          setHistory(prev => [
            ...prev,
            {
              role: 'ai',
              text: aiText
            }
          ]);
        } catch (error) {
          if (retryCount < 5 && apiKey) {
            setTimeout(() => {
              callGemini(prompt, retryCount + 1);
            }, Math.pow(2, retryCount) * 1000);
          } else {
            setHistory(prev => [
              ...prev,
              {
                role: 'error',
                text: 'Error: Connection to WinGen AI Core lost.'
              }
            ]);
          }
        } finally {
          setIsProcessing(false);
          setStatus('SYSTEM READY');
        }
      };

      return (
        <div className="min-h-screen bg-[#008080] flex flex-col font-mono overflow-hidden">
          <div className="flex-1 flex items-center justify-center p-2 md:p-6 pb-12">
            <div className="w-full max-w-2xl bg-black border-2 border-[#dfdfdf] shadow-[2px_2px_0px_#000,inset_1px_1px_0px_#fff] flex flex-col h-[85vh]">

              <div className="bg-[#000080] h-8 flex items-center justify-between px-2 select-none">
                <div className="flex items-center gap-2">
                  <div className="bg-white p-0.5 rounded-sm">
                    <Monitor size={14} className="text-[#000080]" />
                  </div>
                  <span className="text-white text-sm font-bold truncate">
                    Command Prompt - WinGen Terminal
                  </span>
                </div>

                <div className="flex gap-1">
                  <button className="bg-[#dfdfdf] w-5 h-5 flex items-center justify-center border border-black shadow-[1px_1px_0px_#000,inset_1px_1px_0px_#fff]">
                    <Minus size={12} strokeWidth={3} />
                  </button>

                  <button className="bg-[#dfdfdf] w-5 h-5 flex items-center justify-center border border-black shadow-[1px_1px_0px_#000,inset_1px_1px_0px_#fff]">
                    <Square size={10} strokeWidth={3} />
                  </button>

                  <button className="bg-[#dfdfdf] w-5 h-5 flex items-center justify-center border border-black shadow-[1px_1px_0px_#000,inset_1px_1px_0px_#fff]">
                    <X size={12} strokeWidth={3} />
                  </button>
                </div>
              </div>

              <div
                ref={scrollRef}
                className="flex-1 p-3 overflow-y-auto text-gray-200 text-base leading-tight scrollbar-retro"
                onClick={() => inputRef.current?.focus()}
              >
                {history.map((entry, i) => (
                  <div key={i} className="mb-1 whitespace-pre-wrap">
                    {entry.role === 'error' ? (
                      <span className="text-red-400">{entry.text}</span>
                    ) : (
                      entry.text
                    )}
                  </div>
                ))}

                <form onSubmit={handleCommand} className="flex items-center mt-2 group">
                  <span className="flex-shrink-0 mr-2">
                    C:\Users\User&gt;
                  </span>

                  <input
                    ref={inputRef}
                    autoFocus
                    className="bg-transparent border-none outline-none text-white flex-1 p-0 caret-transparent"
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    disabled={isProcessing}
                  />

                  {!isProcessing && (
                    <div className="w-2.5 h-5 bg-gray-400 animate-[pulse_0.8s_infinite]" />
                  )}
                </form>
              </div>

              <div className="bg-[#dfdfdf] border-t border-[#808080] p-1 grid grid-cols-4 text-[10px] text-black font-sans uppercase">
                <div className="border-r border-[#808080] px-2 flex flex-col justify-center leading-none">
                  <div className="text-[9px] mb-0.5">
                    {status.split(' ')[0]}
                  </div>
                  <div className="font-bold">
                    {status.split(' ')[1] || 'READY'}
                  </div>
                </div>

                <div className="border-r border-[#808080] px-2 text-blue-800 font-bold flex flex-col justify-center leading-none text-center">
                  <div>[MOBILE</div>
                  <div>MODE]</div>
                </div>

                <div className="border-r border-[#808080] px-2 flex flex-col justify-center leading-none">
                  <div className="text-[9px] mb-0.5">
                    AI CREDITS: <span className="opacity-60">Ln 1,</span>
                  </div>
                  <div className="flex justify-between font-bold">
                    <span>{credits}</span>
                    <span className="opacity-60 text-[8px]">Col 1</span>
                  </div>
                </div>

                <div className="px-2 flex flex-col justify-center leading-none text-right">
                  <div className="text-[9px] mb-0.5">100%</div>
                  <div className="font-bold">Mobile (vOS)</div>
                </div>
              </div>
            </div>
          </div>

          <div className="fixed bottom-0 left-0 right-0 h-10 bg-[#dfdfdf] border-t-2 border-white shadow-[0_-1px_0px_#808080] flex items-center px-1 z-50">
            <button className="flex items-center gap-1 px-2 py-0.5 border-2 border-white shadow-[1px_1px_0px_#000] font-bold text-sm bg-[#dfdfdf]">
              <div className="w-4 h-4 bg-orange-700 flex items-center justify-center text-[10px] text-white">
                W
              </div>
              Start
            </button>

            <div className="w-[1px] h-6 bg-[#808080] mx-2 border-r border-white"></div>

            <button className="flex items-center gap-2 px-3 py-1 border-2 border-[#808080] bg-[#eeeeee] shadow-[inset_1px_1px_0px_#000] text-xs font-bold min-w-[120px]">
              <Monitor size={12} />
              Command P...
            </button>

            <div className="ml-auto flex items-center gap-2 px-3 py-1 border-2 border-[#808080] shadow-[inset_1px_1px_0px_#fff] text-xs bg-[#dfdfdf]">
              {time}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
